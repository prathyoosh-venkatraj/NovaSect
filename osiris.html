<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaSect - Project Osiris</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .osiris-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .osiris-header {
            text-align: center;
            border-bottom: 1px solid var(--accent-green);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .osiris-title {
            font-size: 2.5em;
            color: var(--accent-green);
            letter-spacing: 4px;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .osiris-subtitle {
            font-family: monospace;
            color: rgba(0, 255, 0, 0.7);
            font-size: 0.9em;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .osiris-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            background: rgba(0, 255, 0, 0.05);
            padding: 15px;
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 4px;
        }

        .osiris-input {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 10px 15px;
            font-family: monospace;
            font-size: 1.1em;
            text-transform: uppercase;
            width: 150px;
            outline: none;
        }

        .osiris-input:focus {
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .osiris-btn {
            background: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 10px 20px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .osiris-btn:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
            border: 1px solid var(--accent-green);
            background: #0a0a0a;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        #osiris-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .oracle-terminal {
            background: rgba(0, 10, 0, 0.9);
            border: 1px solid var(--accent-green);
            padding: 20px;
            min-height: 120px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        .oracle-header {
            position: absolute;
            top: -10px;
            left: 20px;
            background: #000;
            padding: 0 10px;
            color: var(--accent-green);
            font-family: monospace;
            font-size: 0.8em;
            letter-spacing: 2px;
        }

        #oracle-readout {
            font-family: monospace;
            color: var(--accent-green);
            line-height: 1.6;
            font-size: 1.05em;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="index.html" class="logo" style="color: white; text-decoration: none;">NovaSect</a>
        <nav class="nav-links">
            <div class="nav-dropdown">
                <span class="dropdown-trigger nav-link">Tools</span>
                <div class="dropdown-menu">
                    <a href="sentinel.html" class="dropdown-item">Sentinel</a>
                    <a href="reports.html" class="dropdown-item">FinVault</a>
                    <a href="osiris.html" class="dropdown-item">Osiris</a>
                </div>
            </div>
            <a href="about.html" class="nav-link">About us</a>
        </nav>
    </header>

    <main>
        <section class="osiris-container">
            <div class="osiris-header">
                <h1 class="osiris-title">PROJECT OSIRIS</h1>
                <div class="osiris-subtitle">STOCHASTIC PROBABILITY ENGINE // MULTI-PATH FORWARD SIMULATION</div>
            </div>

            <div class="osiris-controls">
                <span style="color: var(--accent-green); font-family: monospace;">TARGET TICKER:</span>
                <input type="text" id="osiris-ticker-input" class="osiris-input" placeholder="e.g. XOM" value="XOM" />
                <button id="osiris-trigger-btn" class="osiris-btn">INITIATE SIMULATION</button>
            </div>

            <div class="canvas-wrapper">
                <canvas id="osiris-canvas"></canvas>
            </div>

            <div class="oracle-terminal">
                <div class="oracle-header">ORACLE SYNTHESIS PROTOCOL</div>
                <div id="oracle-readout">
                    > SYSTEM STANDBY. AWAITING SIMULATION PARAMETERS... <span class="blinking-cursor">_</span>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="components/osiris/osiris.js"></script>
</body>

</html>
