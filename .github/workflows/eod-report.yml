name: EOD Analytics Report

# Posts a weekly Umami analytics digest (last 7 days) to Discord. Reuses the
# health-check Discord webhook unless a dedicated DISCORD_REPORT_WEBHOOK_URL is
# set. The script exits 0 on any failure so a broken run is logged in Actions,
# never emailed to the repo owner as a workflow-failure notification.
#
# Required secret:
#   UMAMI_API_KEY  — Umami Cloud API key (cloud.umami.is -> Settings -> API)
# Reused/optional secrets:
#   DISCORD_REPORT_WEBHOOK_URL  (preferred) or DISCORD_WEBHOOK_URL
#   UMAMI_WEBSITE_ID            (optional; defaults to the NovaSect site id)
#
# Manual run: Actions -> EOD Analytics Report -> Run workflow

on:
  schedule:
    # Weekly — Sunday 21:55 UTC (≈ Sun 22:55 CET / 23:55 CEST, Europe/Berlin).
    - cron: '55 21 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eod-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  report:
    name: Build & post analytics digest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Build & post report
        env:
          UMAMI_API_KEY: ${{ secrets.UMAMI_API_KEY }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          DISCORD_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_URL: https://novasect.space
        run: node scripts/report/eod-umami.mjs
