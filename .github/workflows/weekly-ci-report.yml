name: Weekly CI Report

# Posts a weekly digest of GitHub Actions workflow FAILURES over the last 7
# days to Discord — "what broke this week". Replaces the old daily Umami EOD
# report. The script exits 0 on any error, so a broken run is logged in the
# Actions UI, never emailed to the repo owner as a workflow-failure notice.
#
# Reused/optional secrets:
#   DISCORD_REPORT_WEBHOOK_URL  (preferred) or DISCORD_WEBHOOK_URL
#
# Manual run: Actions -> Weekly CI Report -> Run workflow

on:
  schedule:
    # Weekly — Sunday 21:55 UTC (≈ Sun 22:55 CET / 23:55 CEST, Europe/Berlin).
    - cron: '55 21 * * 0'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: weekly-ci-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  report:
    name: Build & post weekly CI digest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Build & post digest
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DISCORD_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/report/weekly-ci-digest.mjs
