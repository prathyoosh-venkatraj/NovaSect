name: Health Checks

# Layer-1 canaries against the live Vercel deployment.
#  • Liveness checks (proxies, assets, engine, PDF render) run twice daily and
#    post to Discord ONLY when a check changes state (new failure or recovery).
#  • A full snapshot (liveness + data-freshness/drift) runs once daily, ~35 min
#    after the EOD report, and always posts — the daily green/red heartbeat.
# Alert + drift state are persisted between runs via actions/cache (.health).
#
# Setup:
#   Settings -> Secrets and variables -> Actions -> New repository secret
#     Name : DISCORD_WEBHOOK_URL
#     Value: https://discord.com/api/webhooks/<id>/<token>
#
# Manual trigger:
#   Actions -> Health Checks -> Run workflow
#
# Local dry-run (no Discord post):
#   node scripts/health/run-all.mjs

on:
  schedule:
    # Liveness canaries — twice daily (≈ 09:00 & 21:00 Amsterdam). UTC.
    - cron: '0 7,19 * * *'
    # Full snapshot + daily heartbeat — ~35 min after the EOD report (21:55 UTC).
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      smoke_test:
        description: 'Post a one-off test embed to Discord instead of running real checks. Verifies the webhook is wired up correctly.'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  # Only one health-check job at a time per branch so cache
  # restore/save can't race between overlapping runs.
  group: health-checks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    name: Run canaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # Restore the latest dedup state if any prior run cached one.
      # restore-keys does a prefix match across all caches with that
      # prefix, picking the most recently created.
      - name: Restore dedup state
        id: restore-state
        uses: actions/cache/restore@v5
        with:
          path: .health
          key: novasect-health-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            novasect-health-state-

      # Playwright Chromium for the PDF-render smoke check. ~250MB
      # download cold; ~5s warm via the cache below. The browser
      # version is pinned by the playwright package install, so
      # caching by package-lock hash is safe.
      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v1
          restore-keys: |
            playwright-chromium-

      - name: Install Playwright + Chromium
        run: |
          npm install --no-save playwright@1
          npx playwright install --with-deps chromium

      - name: Run health checks
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_URL: https://novasect.space
          SMOKE_TEST: ${{ inputs.smoke_test }}
          # Liveness cron → liveness checks, post only on state change.
          # Daily cron / manual run → full set, always post (the heartbeat).
          HEALTH_SET: ${{ github.event.schedule == '0 7,19 * * *' && 'liveness' || 'all' }}
          ALWAYS_POST: ${{ github.event.schedule == '0 7,19 * * *' && 'false' || 'true' }}
          HEALTH_STATE_DIR: .health
        run: node scripts/health/run-all.mjs

      # Persist updated dedup state for the next scheduled run.
      # if: always() so we save even when checks failed (the script
      # exits non-zero on failure, but the cache should still update).
      - name: Save dedup state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .health
          key: novasect-health-state-${{ github.run_id }}-${{ github.run_attempt }}
